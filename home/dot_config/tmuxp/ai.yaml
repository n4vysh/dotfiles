session_name: ai
suppress_history: true
start_directory: $HOME
windows:
  - layout: tiled
    panes:
      # NOTE: run following commands
      #       ```sh
      #       pwgen -c -n -y -B -1 20 1
      #       gopass insert envs/litellm/POSTGRES_PASSWORD
      #       ```
      - |
        gopass env envs/litellm \
          docker run \
            --rm \
            -p 54320:5432 \
            -e POSTGRES_DB=litellm \
            -e POSTGRES_USER=llmproxy \
            -e POSTGRES_PASSWORD \
            -v litellm-postgres:/var/lib/postgresql/data \
            --name litellm-db \
            postgres:16
      # NOTE: run following commands
      #       ```sh
      #       gopass insert envs/litellm/DATABASE_URL
      #       echo "sk-$(pwgen -c -n -y -B -1 20 1)" |
      #         gopass insert envs/litellm/LITELLM_MASTER_KEY
      #       ```
      # yamllint disable rule:line-length
      - |
        cat <<EOF >|~/.cache/litellm_config.yaml
        litellm_settings:
          drop_params: True
        model_list:
          - model_name: &model chatgpt/gpt-5.5
            model_info:
              mode: responses
            litellm_params:
              model: *model
              additional_drop_params:
                # for git-czg
                # https://github.com/BerriAI/litellm/issues/15070
                - top_p
        EOF
        gopass env envs/litellm \
          docker run \
            --rm \
            --network=host \
            -e STORE_MODEL_IN_DB=True \
            -e LITELLM_DROP_PARAMS=true \
            -e LITELLM_MODIFY_PARAMS=true \
            -e DATABASE_URL \
            -e LITELLM_MASTER_KEY \
            -v "$HOME/.cache/litellm_config.yaml:/app/config.yaml" \
            -v litellm-chatgpt:/root/.config/litellm/chatgpt \
            --name litellm \
            ghcr.io/berriai/litellm:v1.83.14-stable.patch.2 \
                --config /app/config.yaml
      # yamllint enable rule:line-length
